name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://eyeflow:eyeflow_dev_password@127.0.0.1:5432/eyeflow
    services:
      postgres:
        image: postgres:17.9-alpine
        env:
          POSTGRES_DB: eyeflow
          POSTGRES_USER: eyeflow
          POSTGRES_PASSWORD: eyeflow_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eyeflow -d eyeflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      - run: pnpm db:seed
      - run: pnpm --filter @eyeflow/web exec playwright install --with-deps chromium
      - run: pnpm test:e2e
