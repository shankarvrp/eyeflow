apiVersion: apps/v1
kind: Deployment
metadata:
  name: eyeflow-web
  namespace: eyeflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: eyeflow-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eyeflow-web
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/shankarvrp/eyeflow:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: eyeflow-web
            - secretRef:
                name: eyeflow-secrets
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
