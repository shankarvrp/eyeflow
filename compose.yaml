name: eyeflow

services:
  postgres:
    image: postgres:17.9-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eyeflow}
      POSTGRES_USER: ${POSTGRES_USER:-eyeflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eyeflow_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-eyeflow}:${POSTGRES_PASSWORD:-eyeflow_dev_password}@postgres:5432/${POSTGRES_DB:-eyeflow}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-local-development-secret-change-before-production}
      BETTER_AUTH_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
